{% extends "base.html" %}

{% block title %}{{ story.title }} · Cadáver Exquisito{% endblock %}

{% block content %}
<article>
    <h1>{{ story.title }}</h1>
    <p class="text-muted">
        Por {{ story.author }} ·
        <span class="badge bg-secondary">{{ story.get_status_display }}</span> ·
        {{ story.created_at|date:"Y-m-d H:i" }}
    </p>
    <div class="mb-4">{{ story.body|linebreaks }}</div>
    <a class="btn btn-outline-secondary" href="{% url 'stories:update' story.slug %}">Editar</a>
    <a class="btn btn-outline-danger" href="{% url 'stories:delete' story.slug %}">Eliminar</a>
    <a class="btn btn-link" href="{% url 'stories:list' %}">Volver</a>
</article>
{% endblock %}
