<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Cadáver Exquisito{% endblock %}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
    <script
        src="https://unpkg.com/htmx.org@2.0.4"
        integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
        crossorigin="anonymous"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'stories:list' %}">Cadáver Exquisito</a>
            <div class="d-flex align-items-center gap-2">
                {% if user.is_authenticated %}
                <a class="btn btn-outline-light btn-sm" href="{% url 'stories:create' %}">Nueva historia</a>
                <span class="navbar-text text-light">Hola, {{ user }}</span>
                <form method="post" action="{% url 'account_logout' %}" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">Salir</button>
                </form>
                {% else %}
                <a class="btn btn-outline-light btn-sm" href="{% url 'account_login' %}">Entrar</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="container">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
